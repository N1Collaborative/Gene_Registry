<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assessed Variant Details</title>
  
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="variant_entry.css">

   <script>
    async function loadEntry() {
      const urlParams = new URLSearchParams(window.location.search);
      const id = urlParams.get("id");
  
      try {
        const response = await fetch("https://gene-registry.onrender.com/api/data?table=assessed_variants");
        if (!response.ok) throw new Error("Network error");
  
        const data = await response.json();
        const entry = data.find(item => String(item["ID"]) === id);
        document.getElementById("loading-message").style.display = "none";
  
        if (!entry) {
          document.getElementById("variant-details").innerHTML = "<li>Entry not found.</li>";
          return;
        }
  
        const variantFields = [
          "Gene",
          "RefSeq Transcript",
          "Coding DNA change (c.)",
          "Predicted protein change (p.)",
          "Confirmed protein or RNA change",
          "ClinVar",
          "Pathomechanism",
          "Inheritance",
          "Splicing effect?",
          "Variant publication",
          "Therapeutic Modality",
          "Approach",
          "Eligibility",
          "Publication",
          "Date assessment"
        ];
  
        const variantList = document.getElementById("variant-details");
        variantList.innerHTML = "";
  
        variantFields.forEach((key) => {
          let raw = entry[key];
  
          if (key === "Splicing effect?" && (raw === undefined || raw === null)) {
            raw = entry["Splicing effect"] ?? entry["Splicing effect? "] ?? entry["Splicing Effect?"];
          }
  
          if (raw === undefined || raw === null) return;
  
          const value = String(raw).trim();
          if (value === "") return;
  
          let displayValue = value;
  
          if (/^https?:\/\//i.test(value)) {
            displayValue = `<a href="${value}" target="_blank" rel="noopener noreferrer">${value}</a>`;
          }
  
          if (key === "Date assessment") {
            const parsedDate = new Date(value);
            if (!isNaN(parsedDate.getTime())) {
              displayValue = parsedDate.toISOString().split("T")[0];
            }
          }
  
          let labelHTML = `<strong>${key}:</strong>`;
  
          if (key === "Splicing effect?") {
            labelHTML = `
              <strong class="field-label">
                ${key}
                <span class="info-tooltip">
                  <span class="info-icon">i</span>
                  <span class="info-text">
                    A "yes" indicates that there is functional evidence
                    (for example RNA-seq or cDNA analysis in an endogenous background)
                    for a splicing effect. A "no" indicates there is functional evidence against a 
                    splicing effect.
                  </span>
                </span>:
              </strong>
            `;
          }
  
          variantList.insertAdjacentHTML(
            "beforeend",
            `<li>${labelHTML} ${displayValue}</li>`
          );
        });
  
        const assessmentBox = document.getElementById("assessment");
        if (entry["Assessment text"] && String(entry["Assessment text"]).trim() !== "") {
          assessmentBox.innerHTML = `
            <div class="assessment-box">
              <h3>Assessment</h3>
              <p>${entry["Assessment text"]}</p>
            </div>
          `;
        } else {
          assessmentBox.innerHTML = "";
        }
  
      } catch (error) {
        console.error("Error loading entry:", error);
        document.getElementById("variant-details").innerHTML = "<li>Error loading entry details.</li>";
      }
    }
  </script>
</head>
<body onload="loadEntry()">
  <header class="registry-header">
    <div class="registry-header-inner">
      <a href="index.html" class="registry-brand">
        <img src="N1C_logo.jpg" alt="N1C Logo" class="registry-brand-logo">
        <span>N1C Gene Registry</span>
      </a>
  
      <button type="button" class="menu-button" id="menuButton" aria-expanded="false" aria-controls="registryMenu">
        Menu
      </button>
    </div>
  
    <nav class="registry-menu" id="registryMenu">
      <div class="registry-menu-inner">
        <a href="N1C_projects.html">N-of-1 Projects</a>
        <a href="Marketed_drugs.html">Marketed Genetic Therapies</a>
        <a href="assessed_variants.html" class="active">Assessed Variants</a>
        <a href="published_genetic_therapies.html">Published Genetic Therapies</a>
        <a href="assessed_genes_diseases.html">Assessed Genes &amp; Diseases</a>
        <a href="automated_assessment_tools.html">Automated Assessment Tools</a>
        <a href="patients.html" class="patient-link">For Patients</a>
      </div>
    </nav>
  </header>

    <p id="loading-message" class="loading-message">
    Loading assessed variant information...
  </p>

  <div class="entry-box">
    <h2>Variant Information</h2>
    <ul id="variant-details"></ul>
    <div id="assessment"></div>
  </div>

  <a class="back-button" href="assessed_variants.html">Back to Assessed Variants</a>

    <script>
    document.addEventListener("click", function (e) {
      document.querySelectorAll(".info-tooltip").forEach(t => {
        if (!t.contains(e.target)) {
          t.classList.remove("active");
        }
      });
  
      const clickedTooltip = e.target.closest(".info-tooltip");
      if (clickedTooltip) {
        clickedTooltip.classList.toggle("active");
        e.stopPropagation();
      }
    });
  </script>

<script>
  const menuButton = document.getElementById("menuButton");
  const registryMenu = document.getElementById("registryMenu");

  menuButton.addEventListener("click", () => {
    const isOpen = registryMenu.classList.toggle("open");
    menuButton.setAttribute("aria-expanded", isOpen ? "true" : "false");
  });

  document.addEventListener("click", (event) => {
    if (!registryMenu.contains(event.target) && !menuButton.contains(event.target)) {
      registryMenu.classList.remove("open");
      menuButton.setAttribute("aria-expanded", "false");
    }
  });
</script>
  
</body>
</html>
