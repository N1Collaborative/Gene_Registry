<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entry Details</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="entry.css">

    
<script>
  async function loadEntry() {
    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get("id");

    try {
        const response = await fetch("https://gene-registry.onrender.com/api/data?table=N1C_projects");
        if (!response.ok) throw new Error("Network response was not ok");

        const data = await response.json();
        const entry = data.find(item => String(item["ID"]) === id);
        document.getElementById("loading-message").style.display = "none";

        if (!entry) {
            document.getElementById("variant-details").innerHTML = "<li>Entry not found.</li>";
            document.getElementById("contact-details").innerHTML = "";
            return;
        }

        // Define the desired field order
        const variantFields = [
            "Gene", 
            "RefSeq Transcript", 
            "Coding DNA change (c.)", 
            "Predicted protein change (p.)",
            "Confirmed protein or RNA change (for splicing variants)",
            "Variant Publication",
            "Therapeutic Modality", 
            "Approach", 
            "Status", 
            "Indication",
            "Therapy Publication", 
            "IND availability",
            "Information on IND",
            "Cell Line or Animal Model Availability",
            "Comment"
        ];

        const contactFields = [
            "Contact Person", 
            "Institution", 
            "Contact Information (email)"
        ];

        // Clear containers
        const variantList = document.getElementById("variant-details");
        const contactList = document.getElementById("contact-details");
        variantList.innerHTML = "";
        contactList.innerHTML = "";

        // Render only non-empty variant fields
        variantFields.forEach((key) => {
            const value = entry[key];
            if (value && value.trim() !== "") {
                variantList.innerHTML += `<li><strong>${key}:</strong> ${value}</li>`;
            }
        });

        // Render only non-empty contact fields
        contactFields.forEach((key) => {
            const value = entry[key];
            if (value && value.trim() !== "") {
                contactList.innerHTML += `<li><strong>${key}:</strong> ${value}</li>`;
                }
        });

    } catch (error) {
        console.error("Error loading entry:", error);
        document.getElementById("variant-details").innerHTML = "<li>Error loading entry details.</li>";
        document.getElementById("contact-details").innerHTML = "";
    }
}
</script>


    
</head>
<body onload="loadEntry()">

      <header class="registry-header">
          <p id="loading-message" class="loading-message">
              Loading entry information...
        </p>
      <div class="registry-header-inner">
        <a href="index.html" class="registry-brand">
          <img src="N1C_logo.jpg" alt="N1C Logo" class="registry-brand-logo">
          <span>N1C Gene Registry</span>
        </a>
    
        <button type="button" class="menu-button" id="menuButton" aria-expanded="false" aria-controls="registryMenu">
          Menu
        </button>
      </div>
    
      <nav class="registry-menu" id="registryMenu">
        <div class="registry-menu-inner">
          <a href="N1C_projects.html" class="active">N-of-1 Projects</a>
          <a href="Marketed_drugs.html">Marketed Genetic Therapies</a>
          <a href="assessed_variants.html">Assessed Variants</a>
          <a href="published_genetic_therapies.html">Published Genetic Therapies</a>
          <a href="assessed_genes_diseases.html">Assessed Genes &amp; Diseases</a>
          <a href="automated_assessment_tools.html">Automated Assessment Tools</a>
          <a href="patients.html" class="patient-link">For Patients</a>
        </div>
      </nav>
    </header>

    <div class="entry-box">
      <h2>Variant Information</h2>
      <ul id="variant-details"></ul>
    </div>

    <div class="entry-box">
      <h2>Contact Information</h2>
      <ul id="contact-details"></ul>
    </div>
 
</div>
    <a class="back-button" href="N1C_projects.html">Back to N-of-1 Projects</a>

<script>
  const menuButton = document.getElementById("menuButton");
  const registryMenu = document.getElementById("registryMenu");

  menuButton.addEventListener("click", () => {
    const isOpen = registryMenu.classList.toggle("open");
    menuButton.setAttribute("aria-expanded", isOpen ? "true" : "false");
  });

  document.addEventListener("click", (event) => {
    if (!registryMenu.contains(event.target) && !menuButton.contains(event.target)) {
      registryMenu.classList.remove("open");
      menuButton.setAttribute("aria-expanded", "false");
    }
  });
</script>
    
</body>
</html>
